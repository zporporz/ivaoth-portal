<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Traffic TH</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Inter, Arial, sans-serif;
  background:linear-gradient(135deg,#0f172a,#111827 40%,#1e3a8a);
  color:#ffffff;
  min-height:100vh;
}

/* Header */
header{
  padding:20px 36px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:24px;
  flex-wrap:wrap;
}

.brand{
  display:flex;
  align-items:center;
}

.logo{
  height:125px;
  width:auto;
}

/* Right Box */
.pill{
  padding:10px 18px;
  min-width:330px;
  border:1px solid rgba(255,255,255,.2);
  border-radius:18px;
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
}

.member-box{
  text-align:right;
  line-height:1.4;
}

.member-box .title{
  font-size:19px;
  font-weight:800;
  line-height:1.05;
  white-space:nowrap;
}

.member-box a{
  font-size:16px;
  color:#dbeafe;
  text-decoration:none;
}

.member-box a:hover{
  color:#ffffff;
  text-decoration:underline;
}

/* Main */
main{
  max-width:950px;
  margin:90px auto 40px;
  padding:20px;
}

/* Card */
.card{
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.12);
  border-radius:24px;
  padding:50px 45px;
  box-shadow:0 20px 40px rgba(0,0,0,.25);
}

/* Search Box */
.search-box{
  text-align:center;
}

.search-box h1{
  font-size:58px;
  line-height:1.05;
  margin:0 0 12px;
}

.subtitle{
  color:#cbd5e1;
  font-size:18px;
  margin-bottom:34px;
}

/* Search Row */
.search-row{
  display:flex;
  margin-top:10px;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
}

.search-row input{
  width:260px;
  padding:18px 18px;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,.08);
  color:#ffffff;
  font-size:17px;
  outline:none;
}

.search-row input::placeholder{
  color:#cbd5e1;
  font-size:16px;
}

.search-row button{
  padding:18px 34px;
  border:none;
  border-radius:17px;
  background:#3b82f6;
  color:#ffffff;
  font-weight:700;
  cursor:pointer;
  transition:.2s ease;
}

.search-row button:hover{
  transform:translateY(-2px);
  background:#2563eb;
}

/* Results */
#results{
  margin-top:34px;
  text-align:left;
  overflow-x:auto;
}

#results table{
  width:100%;
  border-collapse:collapse;
}

#results th{
  color:#93c5fd;
  font-size:14px;
  padding:12px 10px;
  border-bottom:1px solid rgba(255,255,255,.12);
}

#results td{
  padding:11px 10px;
  border-bottom:1px solid rgba(255,255,255,.06);
  font-size:15px;
}

#results tr:hover{
  background:rgba(255,255,255,.04);
}

/* Footer */
.footer{
  padding:28px;
  text-align:center;
  color:#cbd5e1;
  font-size:14px;
}

/* Mobile */
@media(max-width:900px){

  header{
    justify-content:center;
    text-align:center;
  }

  .member-box{
    text-align:center;
  }

  .logo{
    height:110px;
  }

  .search-box h1{
    font-size:42px;
  }

  .card{
    padding:35px 24px;
  }

  .search-row input{
    width:100%;
  }

  .search-row button{
    width:100%;
  }
}
</style>
</head>

<body>

<header>
  <div class="brand">
    <img src="logo.png" class="logo">
  </div>

  <div class="pill member-box">
    <div class="title">IVAO Flight Tracking System</div>
    <a href="https://www.ivao.aero/Member.aspx?Id=739898" target="_blank">
      Created by Ecgkasit B. - VID: 739898
    </a>
  </div>
</header>

<main>

<div class="card search-box">

  <h1>Thailand Flight Search Portal</h1>

  <p class="subtitle">
    Search real IVAO Thailand traffic history instantly.
  </p>

  <div class="search-row">
    <input id="dep" placeholder="Departure ICAO">
    <input id="arr" placeholder="Arrival ICAO">
    <button onclick="searchFlights()">Search</button>
  </div>

  <div id="results"></div>

</div>

</main>

<div class="footer">
  Traffic TH • Built in Thailand
</div>

<script>
async function searchFlights() {
  const results = document.getElementById("results");

  try {
    results.innerHTML = "Loading...";

    const dep = document.getElementById("dep").value.trim().toUpperCase();
    const arr = document.getElementById("arr").value.trim().toUpperCase();

    if (!dep || !arr) {
      results.innerHTML = "Please enter departure and arrival ICAO.";
      return;
    }

    const res = await fetch(
      `https://ivaoth-bot.fly.dev/api/search?dep=${dep}&arr=${arr}`
    );

    if (!res.ok) {
      throw new Error("API Error: " + res.status);
    }

    const data = await res.json();

    if (data.length === 0) {
      results.innerHTML = "No flights found.";
      return;
    }

    let html = `
      <table>
        <tr>
          <th>Callsign</th>
          <th>Aircraft</th>
          <th>VID</th>
          <th>Time</th>
        </tr>
    `;

    data.forEach(f => {
      html += `
        <tr>
          <td>${f.callsign}</td>
          <td>${f.aircraft}</td>
          <td>${f.vid}</td>
          <td>${f.time}</td>
        </tr>
      `;
    });

    html += "</table>";

    results.innerHTML = html;

  } catch (err) {
    console.error(err);
    results.innerHTML = "Error: " + err.message;
  }
}
</script>

</body>
</html>
