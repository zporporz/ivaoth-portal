<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thailand Flight Search Portal</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Inter,Arial,sans-serif;
  background:linear-gradient(135deg,#081225,#10182d 40%,#1e3a8a);
  min-height:100vh;
  color:#fff;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:24px 40px;
  flex-wrap:wrap;
  gap:20px;
}

.logo{
  height:72px;
}

.top-box{
  padding:12px 18px;
  border-radius:16px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  text-align:right;
}

.top-box .title{
  font-size:20px;
  font-weight:800;
}

.top-box .sub{
  font-size:14px;
  color:#cbd5e1;
}

/* MAIN */
main{
  max-width:920px;
  margin:50px auto;
  padding:20px;
}

.card{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  border-radius:26px;
  padding:48px;
  backdrop-filter:blur(10px);
  box-shadow:0 20px 45px rgba(0,0,0,.28);
}

h1{
  font-size:58px;
  text-align:center;
  margin-bottom:12px;
  line-height:1.05;
}

.subtitle{
  text-align:center;
  color:#cbd5e1;
  margin-bottom:34px;
  font-size:18px;
}

/* FORM */
.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin-bottom:16px;
}

input{
  width:100%;
  padding:18px;
  border:none;
  border-radius:16px;
  background:rgba(255,255,255,.08);
  color:#fff;
  font-size:16px;
  outline:none;
}

input::placeholder{
  color:#cbd5e1;
}

input[type="date"],
input[type="time"]{
  color:#cbd5e1;
}

.btn-wrap{
  text-align:center;
  margin-top:8px;
}

button{
  padding:18px 42px;
  border:none;
  border-radius:16px;
  background:#3b82f6;
  color:#fff;
  font-size:17px;
  font-weight:800;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:translateY(-2px);
  background:#2563eb;
}

/* ALERT */
.alert{
  margin-top:24px;
  padding:16px;
  border-radius:14px;
  text-align:center;
  font-weight:700;
}

.error{
  background:rgba(239,68,68,.15);
  border:1px solid rgba(239,68,68,.35);
  color:#fca5a5;
}

.info{
  background:rgba(59,130,246,.15);
  border:1px solid rgba(59,130,246,.35);
  color:#bfdbfe;
}

/* RESULTS */
#results{
  margin-top:28px;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  color:#93c5fd;
  font-size:14px;
  text-align:left;
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,.12);
}

td{
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,.06);
  font-size:15px;
}

tr:hover{
  background:rgba(255,255,255,.04);
}

/* FOOTER */
footer{
  text-align:center;
  padding:26px;
  color:#cbd5e1;
  font-size:14px;
}

/* MOBILE */
@media(max-width:850px){

  h1{
    font-size:42px;
  }

  .grid2{
    grid-template-columns:1fr;
  }

  .card{
    padding:28px;
  }

  header{
    justify-content:center;
    text-align:center;
  }

  .top-box{
    text-align:center;
  }
}
</style>
</head>

<body>

<header>
  <img src="logo.png" class="logo">

  <div class="top-box">
    <div class="title">IVAO Flight Tracking System</div>
    <div class="sub">Created by Ecgkasit B. - VID: 739898</div>
  </div>
</header>

<main>

<div class="card">

<h1>Thailand Flight Search Portal</h1>
<p class="subtitle">Search real IVAO Thailand traffic history instantly.</p>

<div class="grid2">
  <input id="dep" placeholder="Departure ICAO">
  <input id="arr" placeholder="Arrival ICAO">
</div>

<div class="grid2">
  <input id="fromDate" type="date">
  <input id="fromTime" type="time">
</div>

<div class="grid2">
  <input id="toDate" type="date">
  <input id="toTime" type="time">
</div>

<div class="btn-wrap">
  <button onclick="searchFlights()">Search Flights</button>
</div>

<div id="results"></div>

</div>

</main>

<footer>
Traffic TH • Built in Thailand
</footer>

<script>
async function searchFlights(){

  const results = document.getElementById("results");

  const dep = document.getElementById("dep").value.trim().toUpperCase();
  const arr = document.getElementById("arr").value.trim().toUpperCase();

  const fromDate = document.getElementById("fromDate").value;
  const fromTime = document.getElementById("fromTime").value;

  const toDate = document.getElementById("toDate").value;
  const toTime = document.getElementById("toTime").value;

  if((!dep && !arr) || !fromDate || !fromTime || !toDate || !toTime){
    results.innerHTML =
    '<div class="alert error">Please enter Departure or Arrival, and complete date/time.</div>';
    return;
  }

  results.innerHTML =
  '<div class="alert info">Loading flights...</div>';

  try{

    const from = fromDate + " " + fromTime + ":00";
    const to   = toDate + " " + toTime + ":59";

    const res = await fetch(
      `https://ivaoth-bot.fly.dev/api/search?dep=${dep}&arr=${arr}&from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`
    );

    const data = await res.json();

    if(data.length === 0){
      results.innerHTML =
      '<div class="alert error">No flights found.</div>';
      return;
    }

    let html = `
    <table>
      <tr>
        <th>Callsign</th>
        <th>Aircraft</th>
        <th>VID</th>
        <th>DEP</th>
        <th>ARR</th>
        <th>Track</th>
      </tr>
    `;

    data.forEach(f => {
      html += `
      <tr>
        <td>${f.callsign || "-"}</td>
        <td>${f.aircraft || "-"}</td>
        <td>${f.vid || "-"}</td>
        <td>${f.dep || "-"}</td>
        <td>${f.arr || "-"}</td>
        <td>
          <a href="https://tracker.ivao.aero/sessions/${f.track_id}"
          target="_blank"
          rel="noopener noreferrer"
          style="color:#60a5fa;font-weight:700;text-decoration:none;">
          ${f.track_id || "-"}
          </a>
        </td>
      </tr>
      `;
    });

    html += `</table>`;

    results.innerHTML = html;

  }catch(err){

    results.innerHTML =
    '<div class="alert error">Unable to load data.</div>';

  }
}
</script>

</body>
</html>
