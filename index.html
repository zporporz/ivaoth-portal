<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Traffic TH</title>

<style>
/* Reset */
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Inter, Arial, sans-serif;
  background:linear-gradient(135deg,#0f172a,#111827 40%,#1e3a8a);
  color:#ffffff;
  min-height:100vh;
}

/* Header */
header{
  padding:20px 36px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:24px;
  flex-wrap:wrap;
}

.brand{
  display:flex;
  align-items:center;
}

.logo{
  height:125px;
  width:auto;
}

/* Right Info Box */
.pill{
  padding:10px 18px;
  min-width:330px;
  border:1px solid rgba(255,255,255,.2);
  border-radius:18px;
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
}

.member-box{
  text-align:right;
  line-height:1.4;
}

.member-box .title{
  font-size:19px;
  font-weight:800;
  line-height:1.05;
  white-space:nowrap;
}

.member-box a{
  font-size:16px;
  color:#dbeafe;
  text-decoration:none;
}

.member-box a:hover{
  color:#ffffff;
  text-decoration:underline;
}

/* Main Layout */
main{
  max-width:1100px;
  margin:0 auto;
  padding:48px 24px;
}

.hero{
  display:grid;
  grid-template-columns:1.2fr .8fr;
  gap:28px;
  align-items:center;
}

/* Cards */
.card{
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.12);
  border-radius:24px;
  padding:28px;
  box-shadow:0 20px 40px rgba(0,0,0,.25);
}

/* Typography */
h1{
  font-size:56px;
  line-height:1.05;
  margin:0 0 16px;
}

p{
  font-size:18px;
  color:#dbeafe;
  line-height:1.6;
}

/* Buttons */
.cta{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:22px;
}

.btn{
  padding:14px 18px;
  border-radius:14px;
  text-decoration:none;
  font-weight:700;
  transition:.2s ease;
}

.btn:hover{
  transform:translateY(-2px);
}

.primary{
  background:#3b82f6;
  color:#ffffff;
}

.secondary{
  background:rgba(255,255,255,.08);
  color:#ffffff;
  border:1px solid rgba(255,255,255,.15);
}

/* Stats */
.stats{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

.stat{
  padding:18px;
  border-radius:18px;
  background:rgba(255,255,255,.06);
}

.num{
  font-size:28px;
  font-weight:800;
}

.label{
  color:#cbd5e1;
}

/* Features */
.features{
  margin-top:34px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
}

.feature{
  padding:20px;
}

.feature h3{
  margin:0 0 10px;
}

/* Footer */
.footer{
  padding:28px;
  text-align:center;
  color:#cbd5e1;
}

/* Responsive */
@media(max-width:900px){

  header{
    justify-content:center;
    text-align:center;
  }

  .member-box{
    text-align:center;
  }

  .hero,
  .features{
    grid-template-columns:1fr;
  }

  h1{
    font-size:42px;
  }

  .logo{
    height:120px;
  }
}

main{
  max-width:900px;
  margin:70px auto;
  padding:20px;
}

.search-box{
  text-align:center;
  padding:40px;
}

.search-box h1{
  font-size:54px;
  margin-bottom:10px;
}

.subtitle{
  color:#cbd5e1;
  margin-bottom:30px;
}

.search-row{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
}

.search-row input{
  width:220px;
  padding:14px;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,.08);
  color:white;
}

.search-row button{
  padding:14px 26px;
  border:none;
  border-radius:14px;
  background:#3b82f6;
  color:white;
  font-weight:700;
  cursor:pointer;
}

#results{
  margin-top:30px;
  text-align:left;
}
</style>
</head>

<body>

<header>
  <div class="brand">
    <img src="logo.png" class="logo">
  </div>

  <div class="pill member-box">
    <div class="title">IVAO Flight Tracking System</div>
    <a href="https://www.ivao.aero/Member.aspx?Id=739898" target="_blank">
      Created by Ecgkasit B. - VID: 739898
    </a>
  </div>
</header>

<main>

<div class="card search-box">

  <h1>Thailand Flight Search</h1>
  <p class="subtitle">Search real IVAO Thailand traffic history instantly.</p>

  <div class="search-row">
    <input id="dep" placeholder="Departure ICAO">
    <input id="arr" placeholder="Arrival ICAO">
    <button onclick="searchFlights()">Search</button>
  </div>

  <div id="results"></div>

</div>

</main>

<div class="footer">
  Traffic TH • Built in Thailand
</div>

<script>
async function searchFlights() {
  const results = document.getElementById("results");

  try {
    results.innerHTML = "Loading...";

    const dep = document.getElementById("dep").value.trim().toUpperCase();
    const arr = document.getElementById("arr").value.trim().toUpperCase();

    if (!dep || !arr) {
      results.innerHTML = "Please enter departure and arrival ICAO.";
      return;
    }

    const res = await fetch(
      `https://ivaoth-bot.fly.dev/api/search?dep=${dep}&arr=${arr}`
    );

    if (!res.ok) {
      throw new Error("API Error: " + res.status);
    }

    const data = await res.json();

    if (data.length === 0) {
      results.innerHTML = "No flights found.";
      return;
    }

    let html = `
      <table width="100%" style="color:white;border-collapse:collapse;">
        <tr>
          <th align="left">Callsign</th>
          <th align="left">Aircraft</th>
          <th align="left">VID</th>
          <th align="left">Time</th>
        </tr>
    `;

    data.forEach(f => {
      html += `
        <tr>
          <td>${f.callsign}</td>
          <td>${f.aircraft}</td>
          <td>${f.vid}</td>
          <td>${f.time}</td>
        </tr>
      `;
    });

    html += "</table>";

    results.innerHTML = html;

  } catch (err) {
    console.error(err);
    results.innerHTML = "Error: " + err.message;
  }
}
</script>

</body>
</html>
