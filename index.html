<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IVAO Thailand Flight Portal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--bg:#07111f;
--panel:#0d1a2d;
--panel2:#10223b;
--line:#1e3555;
--text:#eaf2ff;
--muted:#91a7c7;
--blue:#2f7cff;
--blue2:#5aa2ff;
--green:#19c37d;
--red:#ff5d6c;
}

body{
font-family:Inter,Arial,sans-serif;
background:
radial-gradient(circle at top right,#16386d 0%,transparent 30%),
radial-gradient(circle at bottom left,#0e2446 0%,transparent 35%),
var(--bg);
color:var(--text);
min-height:100vh;
}

.app{
display:grid;
grid-template-columns:250px 1fr;
min-height:100vh;
}

.sidebar{
background:linear-gradient(180deg,#07162c,#081120);
border-right:1px solid #122845;
padding:26px 18px;
display:flex;
flex-direction:column;
}

.brand{
display:flex;
justify-content:center;
margin-bottom:28px;
}

.brand img{
width:270px;
height:auto;
}

.nav{
display:flex;
flex-direction:column;
gap:10px;
}

.nav a{
text-decoration:none;
color:#dbe8ff;
padding:14px 16px;
border-radius:14px;
font-weight:600;
}

.nav a.active,
.nav a:hover{
background:rgba(47,124,255,.12);
}

.credit-box{
margin-top:auto;
padding-top:24px;
font-size:13px;
color:#8ea7cc;
}

.credit-box a{
color:#66a8ff;
font-weight:700;
text-decoration:none;
}

.main{
padding:28px;
}

.title h1{
font-size:30px;
}

.title p{
color:var(--muted);
margin-top:6px;
}

.panel{
margin-top:22px;
background:linear-gradient(180deg,var(--panel),var(--panel2));
border:1px solid var(--line);
border-radius:22px;
padding:22px;
}

.search-grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:14px;
}

label{
display:block;
font-size:13px;
color:var(--muted);
margin-bottom:8px;
}

input{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid #1b3557;
background:#081423;
color:#fff;
font-size:18px;
}

.search-options{
margin-top:18px;
padding-top:18px;
border-top:1px solid #183254;
display:flex;
justify-content:space-between;
align-items:center;
gap:18px;
flex-wrap:wrap;
}

.option-group{
display:flex;
gap:26px;
align-items:center;
flex-wrap:wrap;
}

.option-item{
display:flex;
align-items:center;
gap:10px;
font-size:14px;
font-weight:600;
}

.option-item input[type="checkbox"]{
width:18px;
height:18px;
accent-color:#2f7cff;
}

.switch{
position:relative;
display:inline-block;
width:52px;
height:28px;
}

.switch input{
opacity:0;
width:0;
height:0;
}

.slider{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:#44546d;
border-radius:999px;
transition:.25s;
cursor:pointer;
}

.slider:before{
content:"";
position:absolute;
height:22px;
width:22px;
left:3px;
top:3px;
background:#fff;
border-radius:50%;
transition:.25s;
}

.switch input:checked + .slider{
background:#2f7cff;
}

.switch input:checked + .slider:before{
transform:translateX(24px);
}

.action-group{
display:flex;
gap:12px;
flex-wrap:wrap;
}

button{
border:none;
cursor:pointer;
border-radius:14px;
padding:14px 22px;
font-weight:800;
color:#fff;
}

.btn-main{
background:linear-gradient(135deg,#2f7cff,#5aa2ff);
}

.btn-green{
background:linear-gradient(135deg,#1f8f42,#35b85b);
}

.btn-ghost{
background:#0a1627;
border:1px solid #1f395a;
}

.stats{
margin-top:20px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:16px;
}

.stat{
padding:20px;
border-radius:20px;
background:#0f223c;
border:1px solid var(--line);
}

.stat small{color:var(--muted);}
.stat h2{margin-top:8px;font-size:32px;}

#results{
margin-top:18px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:860px;
}

th,td{
padding:14px;
border-bottom:1px solid rgba(255,255,255,.05);
text-align:left;
}

th{
color:#8fb6ff;
}

.track{
color:#72b2ff;
text-decoration:none;
font-weight:800;
}

.msg{
padding:18px;
border-radius:14px;
background:rgba(255,93,108,.08);
border:1px solid rgba(255,93,108,.18);
}

@media(max-width:1200px){
.search-grid,.stats{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:900px){
.app{grid-template-columns:1fr;}
.sidebar{display:none;}
.search-grid,.stats{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="app">

<aside class="sidebar">

<div class="brand">
<img src="logo.png">
</div>

<div class="nav">
<a href="#" class="active">Search Flights</a>
<a href="#">Live Board</a>
<a href="#">Airports</a>
<a href="#">Statistics</a>
</div>

<div class="credit-box">
Created by
<a href="https://ivao.aero/Member.aspx?Id=739898" target="_blank">
Ecgkasit B. 739898
</a>
</div>

</aside>

<main class="main">

<div class="title">
<h1>THAILAND FLIGHT INTELLIGENCE SYSTEM</h1>
<p>Historical IVAO Thailand traffic search & route intelligence</p>
</div>

<div class="panel">

<div class="search-grid">

<div id="airportWrap" style="display:none;">
<label>Airport ICAOs</label>
<input id="airportCodes" placeholder="VTBD, VTSM">
</div>

<div id="depWrap">
<label>Departure ICAOs</label>
<input id="dep" placeholder="VTBD">
</div>

<div id="arrWrap">
<label>Arrival ICAOs</label>
<input id="arr" placeholder="VTSM">
</div>

<div>
<label>From Date</label>
<input id="fromDate" type="date">
</div>

<div>
<label>From Time</label>
<input id="fromTime" type="time">
</div>

<div>
<label>To Date</label>
<input id="toDate" type="date">
</div>

<div>
<label>To Time</label>
<input id="toTime" type="time">
</div>

</div>

<div class="search-options">

<div class="option-group">

<label class="option-item" id="bidiWrap">
<input type="checkbox" id="bidirectional" checked>
Bidirectional Search
</label>

<div class="option-item">
Specific Routes

<label class="switch">
<input type="checkbox" id="modeSwitch" onchange="toggleMode()">
<span class="slider"></span>
</label>
</div>

</div>

<div class="action-group">
<button class="btn-main" onclick="searchFlights()">SEARCH</button>
<button class="btn-green" onclick="exportCSV()">EXPORT CSV</button>
<button class="btn-ghost" onclick="resetForm()">RESET</button>
</div>

</div>

</div>

<div class="stats">
<div class="stat"><small>Flights Found</small><h2 id="statFlights">0</h2></div>
<div class="stat"><small>Unique Pilots</small><h2 id="statPilots">0</h2></div>
<div class="stat"><small>Main Departure</small><h2 id="statDep">-</h2></div>
<div class="stat"><small>Main Arrival</small><h2 id="statArr">-</h2></div>
</div>

<div class="panel">
<h3>Flight Search Results</h3>
<div id="results"></div>
</div>

</main>
</div>

<script>
let latestData = [];

function toggleMode(){

const on = document.getElementById("modeSwitch").checked;

if(on){
// ON = Airport ICAOs
document.getElementById("airportWrap").style.display="block";
document.getElementById("depWrap").style.display="none";
document.getElementById("arrWrap").style.display="none";
document.getElementById("bidiWrap").style.display="none";
}else{
// OFF = dep/arr
document.getElementById("airportWrap").style.display="none";
document.getElementById("depWrap").style.display="block";
document.getElementById("arrWrap").style.display="block";
document.getElementById("bidiWrap").style.display="flex";
}

}

toggleMode();

function resetForm(){
["airportCodes","dep","arr","fromDate","fromTime","toDate","toTime"].forEach(id=>{
const el=document.getElementById(id);
if(el) el.value="";
});
document.getElementById("results").innerHTML="";
latestData=[];
}

async function searchFlights(){

const results = document.getElementById("results");
results.innerHTML = "Searching...";

const modeOn = document.getElementById("modeSwitch").checked;

const fromDate=document.getElementById("fromDate").value;
const fromTime=document.getElementById("fromTime").value;
const toDate=document.getElementById("toDate").value;
const toTime=document.getElementById("toTime").value;

if(!fromDate||!fromTime||!toDate||!toTime){
results.innerHTML='<div class="msg">Complete date/time first.</div>';
return;
}

const from = fromDate+" "+fromTime+":00";
const to   = toDate+" "+toTime+":59";

let allData=[];

try{

if(modeOn){

const airports=document.getElementById("airportCodes").value
.toUpperCase().split(",").map(x=>x.trim()).filter(Boolean);

for(const code of airports){

let r1=await fetch(`https://ivaoth-bot.fly.dev/api/search?dep=${code}&from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);
let d1=await r1.json();

let r2=await fetch(`https://ivaoth-bot.fly.dev/api/search?arr=${code}&from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);
let d2=await r2.json();

allData=allData.concat(d1,d2);
}

}else{

const dep=document.getElementById("dep").value.toUpperCase();
const arr=document.getElementById("arr").value.toUpperCase();

let r=await fetch(`https://ivaoth-bot.fly.dev/api/search?dep=${dep}&arr=${arr}&from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);
allData=await r.json();

if(document.getElementById("bidirectional").checked && dep && arr){

let r2=await fetch(`https://ivaoth-bot.fly.dev/api/search?dep=${arr}&arr=${dep}&from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);
let d2=await r2.json();

allData=allData.concat(d2);
}

}

const map=new Map();
allData.forEach(x=>map.set(x.track_id,x));
allData=[...map.values()];

latestData=allData;

document.getElementById("statFlights").innerText=allData.length;
document.getElementById("statPilots").innerText=new Set(allData.map(x=>x.vid)).size;
document.getElementById("statDep").innerText=allData[0]?.dep || "-";
document.getElementById("statArr").innerText=allData[0]?.arr || "-";

if(allData.length===0){
results.innerHTML='<div class="msg">No flights detected.</div>';
return;
}

let html=`<table>
<tr>
<th>Callsign</th>
<th>Aircraft</th>
<th>VID</th>
<th>Route</th>
<th>Track</th>
</tr>`;

allData.forEach(f=>{
html+=`
<tr>
<td>${f.callsign}</td>
<td>${f.aircraft}</td>
<td>${f.vid}</td>
<td>${f.dep} → ${f.arr}</td>
<td><a class="track" href="https://tracker.ivao.aero/sessions/${f.track_id}" target="_blank">#${f.track_id}</a></td>
</tr>`;
});

html+=`</table>`;
results.innerHTML=html;

}catch(e){
results.innerHTML='<div class="msg">API connection failed.</div>';
}
}

function exportCSV(){

if(latestData.length===0){
alert("No data to export.");
return;
}

let csv="Callsign,Aircraft,VID,DEP,ARR,Track ID\n";

latestData.forEach(f=>{
csv+=`${f.callsign},${f.aircraft},${f.vid},${f.dep},${f.arr},${f.track_id}\n`;
});

const blob=new Blob([csv],{type:"text/csv"});
const url=URL.createObjectURL(blob);

const a=document.createElement("a");
a.href=url;
a.download="ivao-search.csv";
a.click();

URL.revokeObjectURL(url);
}
</script>

</body>
</html>
